name: gon

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to analyze'
        required: true
        type: string
      trigger_user:
        description: 'User who triggered the analysis'
        required: true
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to analyze'
        required: false
        type: string

jobs:
  analyze-dependabot-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      # ------------------------------------------------------------
      # Handle reusable workflow (workflow_call) vs direct triggers
      # ------------------------------------------------------------
      - name: Determine if should run
        id: should-run
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "RUN=true" >> $GITHUB_OUTPUT
            echo "PR_NUMBER=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "TRIGGER_USER=${{ inputs.trigger_user }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ github.event.inputs.pr_number }}"
            if [ -z "$PR_NUM" ]; then
              echo "RUN=false" >> $GITHUB_OUTPUT
              echo "status=No PR number provided" >> $GITHUB_OUTPUT
              exit 0
            fi
            if ! echo "$PR_NUM" | grep -qE '^[0-9]+$'; then
              echo "RUN=false" >> $GITHUB_OUTPUT
              echo "status=Invalid PR number (must be numeric)" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "RUN=true" >> $GITHUB_OUTPUT
            echo "PR_NUMBER=$PR_NUM" >> $GITHUB_OUTPUT
            echo "TRIGGER_USER=${{ github.actor }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT_BODY="${{ github.event.comment.body }}"
            if echo "$COMMENT_BODY" | grep -qiE "^\/(analyze|run analysis|check pr)"; then
              echo "RUN=true" >> $GITHUB_OUTPUT
              echo "PR_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
              echo "TRIGGER_USER=${{ github.event.comment.user.login }}" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "RUN=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "RUN=true" >> $GITHUB_OUTPUT
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "TRIGGER_USER=dependabot[bot]" >> $GITHUB_OUTPUT
          else
            echo "RUN=false" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------------------------
      # Fetch changed files using GitHub API
      # ------------------------------------------------------------
      - name: Get changed files
        if: steps.should-run.outputs.RUN == 'true'
        id: changed-files
        run: |
          PR_NUM="${{ steps.should-run.outputs.PR_NUMBER }}"

          PR_DATA=$(curl -s -w "\n%{http_code}" -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUM")

          HTTP_CODE=$(echo "$PR_DATA" | tail -n1)
          PR_DATA=$(echo "$PR_DATA" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "status=Error fetching PR data (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
            echo "impact=low" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')" >> $GITHUB_OUTPUT
          echo "PR_USER=$(echo "$PR_DATA" | jq -r '.user.login')" >> $GITHUB_OUTPUT

          FILES_JSON=$(curl -s -w "\n%{http_code}" -H "Authorization: token ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUM/files?per_page=100")

          HTTP_CODE=$(echo "$FILES_JSON" | tail -n1)
          FILES_JSON=$(echo "$FILES_JSON" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "status=Error fetching changed files (HTTP $HTTP_CODE)" >> $GITHUB_OUTPUT
            echo "impact=low" >> $GITHUB_OUTPUT
            exit 0
          fi

          FILES=$(echo "$FILES_JSON" | jq -r '.[].filename')
          echo "Changed files: $FILES" >> $GITHUB_STEP_SUMMARY

          DEP_PATTERNS="requirements|setup.py|pyproject.toml|Pipfile|package.json|yarn.lock|pnpm-lock.yaml|Cargo.toml|go.mod|go.sum|composer.json|pom.xml|\.csproj$|Gemfile"

          DEP_FILES=""
          for file in $FILES; do
            if echo "$file" | grep -qiE "$DEP_PATTERNS"; then
              DEP_FILES="$DEP_FILES $file"
            fi
          done

          echo "CHANGED_FILES=$DEP_FILES" >> $GITHUB_OUTPUT

          for file in $DEP_FILES; do
            PATCH=$(echo "$FILES_JSON" | jq -r ".[] | select(.filename==\"$file\") | .patch")
            if [ -n "$PATCH" ] && [ "$PATCH" != "null" ]; then
              SAFE=$(echo "$file" | tr '/.-' '___')
              echo "DIFF_$SAFE=$(echo "$PATCH" | base64 -w 0)" >> $GITHUB_OUTPUT
            fi
          done

      # ------------------------------------------------------------
      # Analyze dependency impact
      # ------------------------------------------------------------
      - name: Analyze changes
        if: steps.should-run.outputs.RUN == 'true'
        id: analysis
        run: |
          PR_TITLE="${{ steps.changed-files.outputs.PR_TITLE }}"
          CHANGED="${{ steps.changed-files.outputs.CHANGED_FILES }}"
          PR_NUMBER="${{ steps.should-run.outputs.PR_NUMBER }}"

          echo "### gon Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- **PR**: #$PR_NUMBER" >> $GITHUB_STEP_SUMMARY
          echo "- **Title**: $PR_TITLE" >> $GITHUB_STEP_SUMMARY

          if [ -z "$CHANGED" ]; then
            echo "- **Impact**: Low - No dependency files changed" >> $GITHUB_STEP_SUMMARY
            echo "impact=low" >> $GITHUB_OUTPUT
            echo "status=No dependency files were modified." >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "impact=medium" >> $GITHUB_OUTPUT

          if echo "$PR_TITLE" | grep -qi "security"; then
            echo "status=Security-related update. Review calmly before merging." >> $GITHUB_OUTPUT
          elif echo "$PR_TITLE" | grep -qiE "(major|breaking)"; then
            echo "impact=high" >> $GITHUB_OUTPUT
            echo "status=Major update detected. Testing is recommended." >> $GITHUB_OUTPUT
          elif echo "$PR_TITLE" | grep -qiE "(minor|patch|chore|deps|fix)"; then
            echo "impact=low" >> $GITHUB_OUTPUT
            echo "status=Minor update. Usually safe to merge." >> $GITHUB_OUTPUT
          else
            echo "status=Review the dependency changes before merging." >> $GITHUB_OUTPUT
          fi

          if echo "$PR_TITLE" | grep -qi "torch\|pytorch"; then
            echo "::warning::PyTorch update - Verify Python version compatibility"
          fi
          if echo "$PR_TITLE" | grep -qi "node\|npm"; then
            echo "::warning::Node.js update - Verify compatibility with your Node version"
          fi
          if echo "$PR_TITLE" | grep -qi "rails\|ruby"; then
            echo "::warning::Rails/Ruby update - Check for breaking changes"
          fi

      # ------------------------------------------------------------
      # Post a calm summary comment
      # ------------------------------------------------------------
      - name: Post summary comment
        if: steps.should-run.outputs.RUN == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const impact = '${{ steps.analysis.outputs.impact }}';
            const status = '${{ steps.analysis.outputs.status }}';
            const changedFiles = '${{ steps.changed-files.outputs.CHANGED_FILES }}';
            const prNumber = '${{ steps.should-run.outputs.PR_NUMBER }}';
            const triggerUser = '${{ steps.should-run.outputs.TRIGGER_USER }}';
            const repoName = context.repo.repo;

            // Get diffs and decode from base64
            const diffRequirementsTxt = '${{ steps.changed-files.outputs.DIFF_requirements_txt }}' ?
              Buffer.from('${{ steps.changed-files.outputs.DIFF_requirements_txt }}', 'base64').toString() : '';
            const diffRequirementsDevTxt = '${{ steps.changed-files.outputs.DIFF_requirements_dev_txt }}' ?
              Buffer.from('${{ steps.changed-files.outputs.DIFF_requirements_dev_txt }}', 'base64').toString() : '';
            const diffSetupPy = '${{ steps.changed-files.outputs.DIFF_setup_py }}' ?
              Buffer.from('${{ steps.changed-files.outputs.DIFF_setup_py }}', 'base64').toString() : '';
            const diffPyprojectToml = '${{ steps.changed-files.outputs.DIFF_pyproject_toml }}' ?
              Buffer.from('${{ steps.changed-files.outputs.DIFF_pyproject_toml }}', 'base64').toString() : '';

            let diffContent = '';
            if (diffRequirementsTxt) {
              diffContent += '\n\n**requirements.txt**\n```diff\n' + diffRequirementsTxt + '\n```';
            }
            if (diffRequirementsDevTxt) {
              diffContent += '\n\n**requirements-dev.txt**\n```diff\n' + diffRequirementsDevTxt + '\n```';
            }
            if (diffSetupPy) {
              diffContent += '\n\n**setup.py**\n```diff\n' + diffSetupPy + '\n```';
            }
            if (diffPyprojectToml) {
              diffContent += '\n\n**pyproject.toml**\n```diff\n' + diffPyprojectToml + '\n```';
            }

            const symbol = impact === 'high' ? '⚠️' : impact === 'medium' ? '◻️' : '✓';
            const marker = '<!-- gon-analyzer -->';

            const body = marker + '\n' +
              `Hi @${triggerUser},\n\n` +
              `I took a calm look at this Dependabot pull request.\n\n` +
              `## gon ${symbol}\n\n` +
              `${status}\n\n` +
              `**Changed files:** ${changedFiles || 'None'}` +
              diffContent + '\n\n---\n*_Reviewed quietly by gon_* | Built for ' + repoName;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Skip
        if: steps.should-run.outputs.RUN != 'true'
        run: echo "gon stayed quiet."
